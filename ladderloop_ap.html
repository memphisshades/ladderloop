<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon/android-chrome-512x512.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Ladder Loop – Endless Climb Arcade Game",
    "description": "Climb ladders that never end. Fall. Repeat. The loop is life.",
    "url": "https://www.ladderloop.com/",
    "image": "https://www.ladderloop.com/images/ladder-loop-icon.jpg",
    "genre": ["Arcade", "Action"],
    "publisher": {
      "@type": "Organization",
      "name": "Ladder Loop Studios",
      "sameAs": [
        "https://www.instagram.com/ladderloopgame/",
        "https://twitter.com/ladderloop"
      ]
    },
    "author": { "@type": "Person", "name": "James Tobin" },
    "mainEntityOfPage": "https://www.ladderloop.com/",
    "datePublished": "2025-12-14",
    "applicationCategory": "Game"
  }
  </script>

  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ============================================================
       RETRO / 80s SITE BACKGROUND SYSTEM
       Base phosphor gradient — JS overrides with theme tints
       on unlock but this always looks good as a baseline.
    ============================================================ */

    /* Animated 80s grid floor — the actual page background */
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #08001a;
      background-image:
        /* Phosphor centre glow — warm purple bloom */
        radial-gradient(
          ellipse 70% 60% at 50% 38%,
          rgba(60,0,100,0.7) 0%,
          rgba(20,0,50,0.5) 45%,
          transparent 75%
        ),
        /* Deep space base */
        linear-gradient(180deg, #05000f 0%, #08001a 50%, #040010 100%);
      color: #fff;
      overflow-x: hidden;
      transition: background-color 3s ease;
    }

    /* Horizon glow — the 80s sunset line at the bottom */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        /* Bottom horizon line glow */
        radial-gradient(
          ellipse 120% 15% at 50% 100%,
          rgba(255,0,150,0.25) 0%,
          transparent 70%
        ),
        /* Top edge fade */
        linear-gradient(
          180deg,
          rgba(0,0,0,0.4) 0%,
          transparent 20%,
          transparent 75%,
          rgba(0,0,0,0.3) 100%
        ),
        /* Corner vignette */
        radial-gradient(
          ellipse 95% 85% at 50% 40%,
          transparent 35%,
          rgba(0,0,0,0.45) 75%,
          rgba(0,0,0,0.8) 100%
        );
      pointer-events: none;
      z-index: 9998;
    }

    /* CRT scanlines — slightly stronger for retro feel */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.18) 0px, transparent 1px,
        transparent 2px, rgba(0,0,0,0.18) 3px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.45;
    }


    /* ============================================================
       SECTION / CONTAINER
    ============================================================ */
    section {
      min-height: 100vh;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      border-top: 2px solid transparent;
      border-image: linear-gradient(90deg, transparent, #ff0066, #00ffcc, #ff0066, transparent) 1;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* Visually-hidden section title (SEO only) */
    .section-title {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 3rem;
      text-align: center;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 40px rgba(0,255,204,0.5);
      position: absolute;
      left: -9999px;
      visibility: hidden;
    }

    /* ============================================================
       GAME CONTAINER & CANVAS
    ============================================================ */
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
    }

    .canvas-wrapper {
      position: relative;
      display: inline-block;
      border: 3px solid #ff0066;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,0,102,0.4);
      padding: 10px;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
    }

    canvas {
      width: 100%;
      height: auto;
      max-width: 400px;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      border: 2px solid #00ffcc;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0,255,204,0.3);
      display: block;
    }

    /* Large-screen canvas scaling */
    @media (min-width: 1920px) { canvas { max-width: 700px; } }
    @media (min-width: 2560px) { canvas { max-width: 1000px; } }
    @media (min-width: 3840px) { canvas { max-width: 1400px; } }
    @media (min-width: 5120px) { canvas { max-width: 1800px; } }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .game-controls {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-btn {
      padding: clamp(0.6rem, 2.5vw, 1rem) clamp(1rem, 5vw, 2rem);
      font-size: clamp(0.55rem, 2.2vw, 0.9rem);
      font-family: 'Press Start 2P', cursive;
      background: rgba(255,0,102,0.12);
      color: #00ffcc;
      border: 2px solid #ff0066;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 0 10px rgba(255,0,102,0.35);
      white-space: nowrap;
      min-height: 44px;       /* mobile tap target */
      touch-action: manipulation;
    }

    .game-btn:hover {
      background: rgba(255,0,102,0.3);
      box-shadow: 0 0 20px rgba(255,0,102,0.6);
      transform: translateY(-2px);
    }

    .game-btn.active {
      background: rgba(0,255,204,0.3);
      border-color: #00ffcc;
      box-shadow: 0 0 20px rgba(0,255,204,0.6);
    }

    /* Mute button pulses when sound is ON (prompting the user to notice it) */
    @keyframes mute-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,0,102,0.3); }
      50%       { box-shadow: 0 0 30px rgba(255,0,102,0.9), 0 0 50px rgba(255,0,102,0.5); }
    }
    .game-btn.mute-btn:not(.active) {
      animation: mute-pulse 1.5s ease-in-out infinite;
    }

    /* Gallery button — cyan flash */
    @keyframes gallery-flash {
      0%, 100% { box-shadow: 0 0 10px rgba(0,255,204,0.3); border-color: #ff0066; }
      50%       { box-shadow: 0 0 25px rgba(0,255,204,0.9), 0 0 45px rgba(0,255,204,0.4); border-color: #00ffcc; }
    }
    .game-btn.gallery-btn {
      animation: gallery-flash 2.2s ease-in-out infinite;
      animation-delay: 0.4s;
    }

    /* Reset button — yellow flash */
    @keyframes reset-flash {
      0%, 100% { box-shadow: 0 0 10px rgba(255,204,0,0.3); border-color: #ff0066; }
      50%       { box-shadow: 0 0 25px rgba(255,204,0,0.9), 0 0 45px rgba(255,204,0,0.4); border-color: #ffcc00; color: #ffcc00; }
    }
    .game-btn.reset-btn {
      animation: reset-flash 1.9s ease-in-out infinite;
      animation-delay: 1.1s;
    }

    /* Canvas-relative overlay buttons */
    .gallery-canvas button { backdrop-filter: blur(6px); }
    .gallery-canvas button:hover { transform: scale(1.08); }

    .gallery-close-btn { position: absolute; top: 8px; right: 8px; padding: 0.6rem 0.8rem; font-size: 0.7rem; z-index: 5; }
    .gallery-next-btn  { position: absolute; bottom: 8px; right: 8px; padding: 0.6rem 0.8rem; font-size: 0.7rem; z-index: 5; }
    .gallery-prev-btn  { position: absolute; bottom: 8px; left: 8px;  padding: 0.6rem 0.8rem; font-size: 0.7rem; z-index: 5; }

    /* ============================================================
       GAME MESSAGE POPUP
    ============================================================ */
    .game-message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10,10,10,0.98);
      color: #ffcc00;
      font-size: 1.2rem;
      padding: 3rem;
      border: 3px solid #ff0066;
      display: none;
      z-index: 2000;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,0,102,0.8);
      max-width: 90vw;
      white-space: pre-line;
      border-radius: 10px;
      text-shadow: 0 0 10px rgba(255,204,0,0.8);
    }

    /* ============================================================
       CHARACTER SELECT OVERLAY
    ============================================================ */
    .character-select-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%,   rgba(255,0,102,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,255,204,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 20% 50%,  rgba(180,0,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 50%,  rgba(0,100,255,0.10) 0%, transparent 60%),
        linear-gradient(160deg, #0a0015 0%, #05000f 50%, #0a0010 100%);
      z-index: 10001;
      display: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 2rem 1rem;
    }

    .character-select-overlay.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: max(1.5rem, env(safe-area-inset-top)) 1rem max(1.5rem, env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      gap: 0;
    }

    /* Inner wrapper — constrains content to a sensible size on any screen */
    .character-select-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      margin: auto; /* centres vertically when content is shorter than viewport */
      padding: 0.5rem 0 1rem;
    }

    /* Remove the old auto-margin hacks — the inner wrapper handles centering now */
    #characterGrid {
      margin-top: 0;
      margin-bottom: 0;
    }
    .character-select-title { margin-top: 3rem; }
    .character-select-divider { margin-bottom: 2rem; }

    @media (max-height: 500px) {
      /* Landscape phone — compact everything so it fits without scrolling */
      .character-select-overlay.active {
        justify-content: flex-start;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
      .character-select-title  { font-size: 0.9rem !important; margin-bottom: 0.25rem !important; margin-top: 2.5rem !important; }
      .character-select-subtitle { font-size: 0.5rem !important; margin-bottom: 0.5rem !important; }
      .character-select-divider { margin-bottom: 0.75rem; }
      .character-grid { gap: 0.5rem; width: 98%; padding: 0 0.25rem; }
      .character-preview { width: 55px !important; height: 55px !important; }
      .character-card { padding: 0.5rem 0.4rem !important; gap: 0.3rem !important; }
      .character-card-name { font-size: 0.45rem !important; }
      .character-card-role { font-size: 0.35rem !important; }
      .team-photo-card { max-height: 100px !important; margin-top: 0.25rem; }
      .team-photo-card img { height: 100px !important; }
    }

    .character-select-title {
      font-size: clamp(1.4rem, 3.5vw, 2.6rem);
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 60px rgba(0,255,204,0.4), 0 0 100px rgba(0,255,204,0.2);
      margin-top: 3rem;
      margin-bottom: 0.6rem;
      text-align: center;
      animation: neon-flicker 8s ease-in-out 2s infinite;
      letter-spacing: 0.05em;
    }

    .character-select-subtitle {
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      color: #ff0066;
      margin-bottom: 0.6rem;
      text-align: center;
      letter-spacing: 0.3em;
    }

    .character-select-divider {
      width: 50%;
      max-width: 350px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff0066, #00ffcc, #ff0066, transparent);
      margin-bottom: 2rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 960px;
      width: 90%;
      padding: 0 1rem;
    }

    /* Scale up grid and cards for large screens so content fills the space */
    @media (min-width: 1920px) {
      .character-select-inner { max-width: 1400px; }
      .character-grid { max-width: 1280px; gap: 2rem; }
      .character-preview { width: 160px !important; height: 160px !important; }
      .character-card { padding: 1.8rem 1.2rem; }
      .character-card-name { font-size: 1rem !important; }
      .character-card-role { font-size: 0.65rem !important; }
      .team-photo-card { max-height: 300px !important; }
      .team-photo-card img { height: 300px !important; }
    }

    @media (min-width: 2560px) {
      .character-select-inner { max-width: 1800px; }
      .character-grid { max-width: 1600px; gap: 2.5rem; }
      .character-preview { width: 200px !important; height: 200px !important; }
      .character-card { padding: 2rem 1.5rem; }
      .character-card-name { font-size: 1.2rem !important; }
      .character-card-role { font-size: 0.75rem !important; }
      .team-photo-card { max-height: 380px !important; }
      .team-photo-card img { height: 380px !important; }
    }

    .team-photo-card {
      grid-column: 1 / -1;
      border: 2px solid #00ffcc;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,204,0.3), inset 0 0 20px rgba(0,255,204,0.04);
      background: linear-gradient(160deg, rgba(0,255,204,0.05), rgba(0,100,255,0.08));
      max-height: 220px;
      position: relative;
      margin-top: 0.5rem;
    }

    .team-photo-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center 0%;
      display: block;
      animation: team-pan 8s ease-in-out infinite;
    }

    @keyframes team-pan {
      0%   { object-position: center 0%; }
      50%  { object-position: center 100%; }
      100% { object-position: center 0%; }
    }

    .team-photo-card .team-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
      padding: 1rem 1.5rem 0.75rem;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.4rem, 1.2vw, 0.65rem);
      color: #00ffcc;
      letter-spacing: 0.15em;
      text-shadow: 0 0 10px rgba(0,255,204,0.6);
    }

    @media (min-width: 700px) {
      .team-photo-card {
        grid-column: 2 / 4;
        grid-row: 2;
        max-height: 260px;
      }
      .team-photo-card img { height: 260px; }
    }

    @media (max-width: 700px) {
      .character-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        width: 95%;
        padding: 0 0.5rem;
      }
      .character-preview { width: 75px; height: 75px; }
      .character-card { padding: 0.75rem 0.5rem; gap: 0.5rem; }
      .character-card-name { font-size: 0.6rem; }
      .character-card-role { font-size: 0.4rem; }
      .team-photo-card { grid-column: 1 / -1; max-height: 160px; margin-top: 0.25rem; }
      .team-photo-card img { height: 160px; }
    }

    .character-card {
      border: 2px solid #ff0066;
      border-radius: 12px;
      padding: 1.5rem 1rem 1.2rem;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      background: linear-gradient(160deg, rgba(255,0,102,0.07), rgba(120,0,200,0.1));
      box-shadow: 0 0 18px rgba(255,0,102,0.18), inset 0 0 20px rgba(255,0,102,0.04);
      position: relative;
      overflow: hidden;
    }

    .character-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .character-card:hover {
      transform: translateY(-10px) scale(1.04);
      box-shadow: 0 0 35px rgba(255,0,102,0.6), 0 0 70px rgba(255,0,102,0.2), inset 0 0 30px rgba(255,0,102,0.08);
      border-color: #00ffcc;
    }

    .character-preview {
      width: 130px; height: 130px;
      border: 2px solid rgba(0,255,204,0.6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 14px rgba(0,255,204,0.25);
    }

    .character-card-name {
      color: #ffcc00;
      font-size: 0.85rem;
      text-align: center;
      text-shadow: 0 0 8px rgba(255,204,0,0.5);
      letter-spacing: 0.05em;
    }
    .character-card-role {
      color: #00ffcc;
      font-size: 0.55rem;
      text-align: center;
      letter-spacing: 0.15em;
      opacity: 0.85;
    }

    /* ============================================================
       GALLERY OVERLAY
    ============================================================ */
    .gallery-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0a;
      z-index: 5000;
      display: none;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .gallery-overlay.active {
      display: block;
    }

    .gallery-content {
      width: 100%;
      display: block;
    }

    .gallery-slide { display: none; width: 100%; }

    .gallery-slide.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem 4rem;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .character-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .character-name {
      color: #ffcc00;
      font-size: 1.2rem;
      text-align: center;
      text-shadow: 0 0 10px rgba(255,204,0,0.8);
    }

    .character-status {
      color: #00ffcc;
      font-size: clamp(0.55rem, 2.2vw, 0.9rem);
      padding: 0;
      width: 200px;
      background: rgba(0,255,204,0.1);
      border: 2px solid #00ffcc;
      border-radius: 6px;
      height: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      font-family: 'Press Start 2P', cursive;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .select-char-btn {
      min-width: 260px;
      height: 44px;
      min-height: 44px;
      padding: 0 1.5rem !important;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0 !important;
      font-size: clamp(0.55rem, 2.2vw, 0.9rem) !important;
      white-space: nowrap;
    }

    @keyframes select-flash {
      0%, 100% { box-shadow: 0 0 10px rgba(255,0,102,0.3); border-color: #ff0066; }
      50%       { box-shadow: 0 0 28px rgba(255,0,102,1), 0 0 55px rgba(255,0,102,0.5); border-color: #ff66aa; background: rgba(255,0,102,0.25); }
    }
    .select-char-btn:not(.active) {
      animation: select-flash 1.4s ease-in-out infinite;
    }


    /* ============================================================
       COMING SOON OVERLAY
    ============================================================ */
    .coming-soon-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,10,10,0.98);
      z-index: 10000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: max(4rem, env(safe-area-inset-top));
    }

    .coming-soon-overlay.active { display: flex; }

    .coming-soon-content { max-width: 900px; width: 100%; text-align: center; }

    .coming-soon-title {
      font-family: 'Press Start 2P', cursive;

  <script>
  (function() {
    const header = document.getElementById('site-header');
    let lastY = 0, ticking = false;

    // Show header — called once after intro is dismissed
    window.showSiteHeader = function() {
      header.classList.add('visible');
      header.classList.remove('hidden');
    };

    function onScroll(y) {
      if (!header.classList.contains('visible')) return;
      if (!ticking) {
        requestAnimationFrame(() => {
          if (y > lastY && y > 60) header.classList.add('hidden');
          else header.classList.remove('hidden');
          lastY = y;
          ticking = false;
        });
        ticking = true;
      }
    }

    window.addEventListener('scroll', () => onScroll(window.scrollY), { passive: true });

    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('characterSelect');
      if (overlay) overlay.addEventListener('scroll', () => onScroll(overlay.scrollTop), { passive: true });
    });

    // Always show header when character select opens
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('characterSelect');
      if (overlay) {
        new MutationObserver(() => {
          if (overlay.classList.contains('active')) {
            header.classList.remove('hidden');
            lastY = 0;
          }
        }).observe(overlay, { attributes: true, attributeFilter: ['class'] });
      }
    });
  })();
  </script>

    const w = size, h = size;

    ctx.fillRect(x - w*0.1, y + h*0.35, w*1.2, h*0.65);

    ctx.fillRect(x + w*0.25, y + h*0.15, w*0.15, h*0.1);

  function drawMarioSprite(ctx, x, y, size) {
    const w = size, h = size;
    const bodyW = w * 0.65;
    const bodyX = x + (w - bodyW) / 2;
    const time = Date.now();
    // Body
    ctx.fillStyle = '#f38181';
    ctx.fillRect(bodyX, y + h*0.42, bodyW, h*0.58);
    ctx.fillRect(bodyX - w*0.14, y + h*0.52, w*0.32, h*0.12);
    ctx.fillRect(bodyX + bodyW - w*0.18, y + h*0.52, w*0.32, h*0.12);
    // Head
    ctx.fillStyle = '#f4c49c';
    ctx.fillRect(x + w*0.26, y + h*0.10, w*0.48, h*0.36);
    // Blond hair
    ctx.fillStyle = '#f4d03f';
    ctx.fillRect(x + w*0.26, y + h*0.02, w*0.48, h*0.14);
    ctx.fillRect(x + w*0.28, y - h*0.02, w*0.10, h*0.06);
    ctx.fillRect(x + w*0.40, y - h*0.03, w*0.12, h*0.07);
    ctx.fillRect(x + w*0.54, y - h*0.02, w*0.10, h*0.06);
    ctx.fillRect(x + w*0.24, y + h*0.08, w*0.06, h*0.08);
    ctx.fillRect(x + w*0.70, y + h*0.08, w*0.06, h*0.08);
    // Wink logic
    const winkCycle = time % 4000;
    const isWinking = winkCycle > 3300 && winkCycle < 3550;
    ctx.fillStyle = '#000';
    ctx.fillRect(x + w*0.34, y + h*0.22, w*0.08, h*0.07);
    if (isWinking) ctx.fillRect(x + w*0.58, y + h*0.25, w*0.08, h*0.02);
    else           ctx.fillRect(x + w*0.58, y + h*0.22, w*0.08, h*0.07);
    // Smile + teeth
    ctx.fillRect(x + w*0.34, y + h*0.34, w*0.32, h*0.04);
    ctx.fillStyle = '#fff';
    [0.36, 0.44, 0.52].forEach(tx => ctx.fillRect(x + w*tx, y + h*0.35, w*0.06, h*0.025));
    // Tooth sparkle
    if (time % 3000 < 200) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + w*0.48, y + h*0.335, w*0.015, h*0.015);
      ctx.fillRect(x + w*0.475, y + h*0.34, w*0.025, h*0.005);
    }
    // Paintbrush
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(bodyX + bodyW + w*0.10, y + h*0.54, w*0.22, h*0.07);
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(bodyX + bodyW + w*0.28, y + h*0.52, w*0.07, h*0.11);
    ctx.fillStyle = '#4169E1';
    ctx.fillRect(bodyX + bodyW + w*0.35, y + h*0.50, w*0.11, h*0.15);
    // Dripping paint
    ctx.fillStyle = '#4169E1';
    [0, 10, 20].forEach((offset, i) => {
      const drip = (time / 200 % 30 + offset) * 2;
      if (drip < 50) ctx.fillRect(bodyX + bodyW + w*(0.39 + i*0.03), y + h*0.68 + drip, w*0.035, h*0.07);
    });
  }

      ctx.arc(x - w*0.20, y + h*0.42 - smoke*0.01*h, w*0.03, 0, Math.PI*2);
      ctx.fill();

  // Dispatcher: draw the correct sprite for a given character object
  function drawSprite(ctx, charObj, x, y, size) {
    if (!charObj) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x, y, size, size);
      return;
    }
    switch (charObj.id) {
      case 'swarvek': drawSwarvekSprite(ctx, x, y, size); break;
      case 'michel':  drawMichelSprite(ctx, x, y, size);  break;
      case 'greg':    drawGregSprite(ctx, x, y, size);    break;
      case 'mario':   drawMarioSprite(ctx, x, y, size);   break;
      case 'derek':   drawDerekSprite(ctx, x, y, size);   break;
      case 'tobin':   drawJamesSprite(ctx, x, y, size);   break;
      default:
        ctx.fillStyle = charObj.color || '#ffcc00';
        ctx.fillRect(x, y, size, size);
    }
  }

  /* ============================================================
     4. DRAW  — ladder, character, benched cube, score, gallery
  ============================================================ */

  /* ============================================================
     DRAW BACKGROUND  — animated canvas backgrounds, one per theme
  ============================================================ */

  // Persistent state for backgrounds that need continuity between frames
  const BG = {
    stars:      null,   // Deep Space star positions
    gridOffset: 0,      // Electric Grid scroll
    blobs:      null,   // Lava Lamp blob positions
    matrixCols: null,   // Matrix Rain column state
    auroraT:    0,      // Northern Lights time
    particles:  null,   // Gold Dust particles
    rainDrops:  null,   // Crimson Storm drops
    cityLights: null,   // Cyber City window flicker state
    bubbles:    null,   // Deep Ocean bubbles
    arcticT:    0,      // Arctic Pulse time
    sunsetT:    0,      // Sunset Blaze time
    jungleVines:null,   // Toxic Jungle drips
    voidT:      0,      // Magenta Void time
    abyssT:     0,      // Ocean Abyss time
    rainbowT:   0,      // Rainbow Prism time
  };

  function drawBackground(ctx, canvas) {
    const idx = S.currentLadderColorIndex;
    const t   = Date.now();
    const w   = canvas.width;
    const h   = canvas.height;
    const s   = S.gameScale;

    switch (idx) {

      // 0 — Deep Space: slow drifting stars
      case 0: {
        ctx.fillStyle = '#000008';
        ctx.fillRect(0, 0, w, h);
        if (!BG.stars) {
          BG.stars = Array.from({ length: 80 }, () => ({
            x: Math.random() * 400, y: Math.random() * 450,
            r: Math.random() * 1.5 + 0.3,
            speed: Math.random() * 0.15 + 0.02,
            twinkle: Math.random() * Math.PI * 2,
          }));
        }
        BG.stars.forEach(star => {
          star.y += star.speed;
          if (star.y > 450) { star.y = 0; star.x = Math.random() * 400; }
          const alpha = 0.4 + 0.6 * Math.abs(Math.sin(t / 1200 + star.twinkle));
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(star.x * s, star.y * s, star.r * s, 0, Math.PI * 2);
          ctx.fill();
        });
        break;
      }

      // 1 — Electric Grid: slow pulsing neon lines
      case 1: {
        ctx.fillStyle = '#000a14';
        ctx.fillRect(0, 0, w, h);
        BG.gridOffset = (BG.gridOffset + 0.3) % (30 * s);
        const pulse = 0.15 + 0.1 * Math.sin(t / 800);
        ctx.strokeStyle = `rgba(0,204,255,${pulse})`;
        ctx.lineWidth = 1 * s;
        for (let x = -30*s; x < w + 30*s; x += 30*s) {
          ctx.beginPath(); ctx.moveTo(x + BG.gridOffset, 0); ctx.lineTo(x + BG.gridOffset, h); ctx.stroke();
        }
        for (let y = -30*s; y < h + 30*s; y += 30*s) {
          ctx.beginPath(); ctx.moveTo(0, y + BG.gridOffset); ctx.lineTo(w, y + BG.gridOffset); ctx.stroke();
        }
        // Bright intersections
        ctx.fillStyle = `rgba(0,255,255,${pulse * 1.5})`;
        for (let x = -30*s; x < w + 30*s; x += 30*s)
          for (let y = -30*s; y < h + 30*s; y += 30*s) {
            ctx.beginPath();
            ctx.arc(x + BG.gridOffset, y + BG.gridOffset, 1.5*s, 0, Math.PI*2);
            ctx.fill();
          }
        break;
      }

      // 2 — Lava Lamp: slow rising blobs
      case 2: {
        ctx.fillStyle = '#1a0005';
        ctx.fillRect(0, 0, w, h);
        if (!BG.blobs) {
          BG.blobs = Array.from({ length: 6 }, (_, i) => ({
            x: 60 + i * 55, y: 300 + Math.random() * 150,
            rx: 25 + Math.random() * 20, ry: 30 + Math.random() * 20,
            speed: 0.2 + Math.random() * 0.3,
            phase: Math.random() * Math.PI * 2,
          }));
        }
        BG.blobs.forEach(b => {
          b.y -= b.speed;
          b.x += Math.sin(t / 2000 + b.phase) * 0.4;
          if (b.y < -60) { b.y = 500; b.x = 40 + Math.random() * 320; }
          const alpha = 0.35 + 0.2 * Math.sin(t / 1500 + b.phase);
          const g = ctx.createRadialGradient(b.x*s, b.y*s, 0, b.x*s, b.y*s, b.rx*s);
          g.addColorStop(0, `rgba(255,80,0,${alpha})`);
          g.addColorStop(1, `rgba(180,0,20,0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(b.x*s, b.y*s, b.rx*s, b.ry*s, 0, 0, Math.PI*2);
          ctx.fill();
        });
        break;
      }

      // 3 — Matrix Rain: falling green characters
      case 3: {
        // Fade rather than clear for trail effect
        ctx.fillStyle = 'rgba(0,10,0,0.18)';
        ctx.fillRect(0, 0, w, h);
        const colW = 14 * s;
        const cols = Math.floor(w / colW);
        if (!BG.matrixCols) {
          BG.matrixCols = Array.from({ length: cols }, () => ({
            y: Math.random() * -200,
            speed: 0.8 + Math.random() * 1.2,
            chars: Array.from({ length: 20 }, () => String.fromCharCode(0x30A0 + Math.random() * 96)),
          }));
        }
        BG.matrixCols.forEach((col, i) => {
          col.y += col.speed;
          if (col.y > h / (12*s)) { col.y = Math.random() * -100 / (12*s); }
          col.chars.forEach((ch, j) => {
            const alpha = Math.max(0, 1 - j * 0.07);
            if (j === 0) ctx.fillStyle = `rgba(180,255,180,${alpha})`;
            else         ctx.fillStyle = `rgba(0,${150 + j*5},0,${alpha})`;
            ctx.font = `${12*s}px monospace`;
            ctx.fillText(ch, i * colW, (col.y - j) * 12*s);
          });
          // Randomly mutate one char
          if (Math.random() < 0.05) {
            const ri = Math.floor(Math.random() * col.chars.length);
            col.chars[ri] = String.fromCharCode(0x30A0 + Math.random() * 96);
          }
        });
        break;
      }

      // 4 — Northern Lights: slow aurora shimmer (low-cost version)
      case 4: {
        ctx.fillStyle = '#000d08';
        ctx.fillRect(0, 0, w, h);
        BG.auroraT = t / 3000;
        // Draw wide horizontal bands with sinusoidal y-offset — no per-column gradients
        const bands = [
          { color: [0, 255, 100],   yBase: 0.22 },
          { color: [100, 0, 255],   yBase: 0.38 },
          { color: [0, 200, 255],   yBase: 0.52 },
        ];
        // Use one vertical gradient per band (3 total, not hundreds)
        const steps = Math.ceil(w / (8*s));
        bands.forEach((band, bi) => {
          const [r,g,b2] = band.color;
          for (let xi = 0; xi <= steps; xi++) {
            const nx = xi / steps;
            const x  = nx * w;
            const ny = band.yBase + 0.06 * Math.sin(nx * 5 + BG.auroraT + bi) * Math.cos(nx * 3 - BG.auroraT * 0.6);
            const bh = 50 * s * (0.6 + 0.4 * Math.sin(nx * 2 + BG.auroraT));
            const alpha = 0.10 + 0.07 * Math.sin(nx * 4 + BG.auroraT + bi * 1.2);
            ctx.fillStyle = `rgba(${r},${g},${b2},${alpha})`;
            ctx.fillRect(x, ny * h, 8*s + 1, bh);
          }
        });
        break;
      }

      // 5 — Gold Dust: floating particles
      case 5: {
        ctx.fillStyle = '#0d0900';
        ctx.fillRect(0, 0, w, h);
        if (!BG.particles) {
          BG.particles = Array.from({ length: 60 }, () => ({
            x: Math.random() * 400, y: Math.random() * 450,
            vx: (Math.random() - 0.5) * 0.3, vy: -(Math.random() * 0.4 + 0.1),
            size: Math.random() * 2 + 0.5,
            phase: Math.random() * Math.PI * 2,
          }));
        }
        BG.particles.forEach(p => {
          p.x += p.vx + Math.sin(t / 2000 + p.phase) * 0.2;
          p.y += p.vy;
          if (p.y < -5) { p.y = 455; p.x = Math.random() * 400; }
          const alpha = 0.4 + 0.4 * Math.sin(t / 1000 + p.phase);
          ctx.fillStyle = `rgba(255,215,0,${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x*s, p.y*s, p.size*s, 0, Math.PI*2);
          ctx.fill();
        });
        break;
      }

      // 6 — Crimson Storm: slow diagonal rain streaks
      case 6: {
        ctx.fillStyle = '#0d0000';
        ctx.fillRect(0, 0, w, h);
        if (!BG.rainDrops) {
          BG.rainDrops = Array.from({ length: 40 }, () => ({
            x: Math.random() * 500, y: Math.random() * 450,
            len: 15 + Math.random() * 25,
            speed: 1.5 + Math.random() * 1.5,
            alpha: 0.1 + Math.random() * 0.25,
          }));
        }
        BG.rainDrops.forEach(d => {
          d.x += d.speed * 0.4; d.y += d.speed;
          if (d.y > 460) { d.y = -20; d.x = Math.random() * 400; }
          ctx.strokeStyle = `rgba(200,0,0,${d.alpha})`;
          ctx.lineWidth = 1 * s;
          ctx.beginPath();
          ctx.moveTo(d.x*s, d.y*s);
          ctx.lineTo((d.x - d.len*0.4)*s, (d.y - d.len)*s);
          ctx.stroke();
        });
        break;
      }

      // 7 — Cyber City: scrolling skyline silhouette with lit windows
      case 7: {
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, w, h);
        if (!BG.cityLights) {
          // Generate building layout once
          BG.cityLights = { scroll: 0, buildings: [] };
          let bx = 0;
          while (bx < 800) {
            const bw = 20 + Math.random() * 35;
            const bh = 40 + Math.random() * 180;
            const windows = [];
            for (let wy = 8; wy < bh - 8; wy += 14) {
              for (let wx = 4; wx < bw - 4; wx += 10) {
                windows.push({ ox: wx, oy: wy, lit: Math.random() > 0.4, flickerPhase: Math.random() * Math.PI * 2 });
              }
            }
            BG.cityLights.buildings.push({ x: bx, w: bw, h: bh, windows });
            bx += bw + 2 + Math.random() * 8;
          }
        }
        BG.cityLights.scroll = (BG.cityLights.scroll + 0.2) % 400;
        const sc2 = BG.cityLights.scroll;
        BG.cityLights.buildings.forEach(b => {
          const drawX = ((b.x - sc2) % 800 + 800) % 800 - 50;
          const drawY = h - b.h * s;
          ctx.fillStyle = '#0a0a1a';
          ctx.fillRect(drawX, drawY, b.w*s, b.h*s);
          b.windows.forEach(win => {
            const flicker = Math.sin(t / 3000 + win.flickerPhase) > 0.92;
            const isLit = win.lit && !flicker;
            ctx.fillStyle = isLit ? `rgba(255,200,80,0.7)` : `rgba(30,30,60,0.5)`;
            ctx.fillRect(drawX + win.ox*s, drawY + win.oy*s, 5*s, 7*s);
          });
        });
        break;
      }

      // 8 — Deep Ocean: rising bubbles
      case 8: {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#000a14'); grad.addColorStop(1, '#001428');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
        if (!BG.bubbles) {
          BG.bubbles = Array.from({ length: 30 }, () => ({
            x: Math.random() * 400, y: Math.random() * 450,
            r: 2 + Math.random() * 6,
            speed: 0.3 + Math.random() * 0.5,
            wobble: Math.random() * Math.PI * 2,
          }));
        }
        BG.bubbles.forEach(b => {
          b.y -= b.speed;
          b.x += Math.sin(t / 1500 + b.wobble) * 0.4;
          if (b.y < -10) { b.y = 460; b.x = Math.random() * 400; }
          const alpha = 0.15 + 0.1 * Math.sin(t / 1000 + b.wobble);
          ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
          ctx.lineWidth = 1 * s;
          ctx.beginPath();
          ctx.arc(b.x*s, b.y*s, b.r*s, 0, Math.PI*2);
          ctx.stroke();
          // Highlight
          ctx.fillStyle = `rgba(200,240,255,${alpha * 0.5})`;
          ctx.beginPath();
          ctx.arc((b.x - b.r*0.3)*s, (b.y - b.r*0.3)*s, b.r*0.3*s, 0, Math.PI*2);
          ctx.fill();
        });
        break;
      }

      // 9 — Arctic Pulse: slow concentric rings expanding out
      case 9: {
        ctx.fillStyle = '#000d14';
        ctx.fillRect(0, 0, w, h);
        BG.arcticT = (t / 4000) % 1;
        for (let i = 0; i < 5; i++) {
          const phase = (BG.arcticT + i * 0.2) % 1;
          const radius = phase * Math.max(w, h) * 0.8;
          const alpha = (1 - phase) * 0.12;
          ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
          ctx.lineWidth = 2 * s;
          ctx.beginPath();
          ctx.arc(w/2, h/2, radius, 0, Math.PI*2);
          ctx.stroke();
        }
        break;
      }

      // 10 — Sunset Blaze: animated gradient wash
      case 10: {
        BG.sunsetT = t / 5000;
        const r1 = Math.floor(180 + 40 * Math.sin(BG.sunsetT));
        const g1 = Math.floor(40  + 20 * Math.sin(BG.sunsetT * 0.7));
        const grad2 = ctx.createLinearGradient(0, 0, 0, h);
        grad2.addColorStop(0, `rgb(${r1},${g1},0)`);
        grad2.addColorStop(0.5, `rgb(120,20,40)`);
        grad2.addColorStop(1, `rgb(10,0,20)`);
        ctx.fillStyle = grad2; ctx.fillRect(0, 0, w, h);
        // Slow horizontal shimmer bands
        for (let i = 0; i < 3; i++) {
          const y = h * (0.3 + 0.15*i) + Math.sin(BG.sunsetT * 0.8 + i) * 20*s;
          const a = 0.06 + 0.03 * Math.sin(BG.sunsetT + i);
          ctx.fillStyle = `rgba(255,120,0,${a})`;
          ctx.fillRect(0, y, w, 20*s);
        }
        break;
      }

      // 11 — Toxic Jungle: dripping green tendrils from top
      case 11: {
        ctx.fillStyle = '#020d00';
        ctx.fillRect(0, 0, w, h);
        if (!BG.jungleVines) {
          BG.jungleVines = Array.from({ length: 15 }, () => ({
            x: Math.random() * 400, len: 30 + Math.random() * 120,
            speed: 0.1 + Math.random() * 0.2, phase: Math.random() * Math.PI * 2,
          }));
        }
        BG.jungleVines.forEach(v => {
          v.len += v.speed;
          if (v.len > 200) { v.len = 10; v.x = Math.random() * 400; }
          const alpha = 0.2 + 0.15 * Math.sin(t / 2000 + v.phase);
          ctx.strokeStyle = `rgba(0,${150 + Math.floor(80*Math.sin(t/1000+v.phase))},0,${alpha})`;
          ctx.lineWidth = 2 * s;
          ctx.beginPath();
          ctx.moveTo(v.x*s, 0);
          for (let seg = 0; seg < v.len; seg += 5) {
            ctx.lineTo((v.x + Math.sin(seg * 0.3 + v.phase) * 8)*s, seg*s);
          }
          ctx.stroke();
          // Drip tip
          ctx.fillStyle = `rgba(0,255,50,${alpha * 1.5})`;
          ctx.beginPath();
          ctx.ellipse(v.x*s, v.len*s, 3*s, 5*s, 0, 0, Math.PI*2);
          ctx.fill();
        });
        break;
      }

      // 12 — Magenta Void: slow pulsing void geometry (low-cost)
      case 12: {
        ctx.fillStyle = '#0d0010';
        ctx.fillRect(0, 0, w, h);
        BG.voidT = t / 4000;
        // Draw filled circles instead of full-canvas radial gradient fills
        for (let i = 0; i < 4; i++) {
          const angle = BG.voidT + i * Math.PI / 2;
          const dist  = 80*s + 30*s * Math.sin(BG.voidT * 0.7 + i);
          const x = w/2 + Math.cos(angle) * dist;
          const y = h/2 + Math.sin(angle) * dist;
          const alpha = 0.18 + 0.1 * Math.sin(BG.voidT * 1.3 + i);
          ctx.fillStyle = `rgba(200,0,200,${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, 55*s, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.strokeStyle = 'rgba(255,0,200,0.06)'; ctx.lineWidth = 1*s;
        for (let i = 0; i < 6; i++) {
          const a = BG.voidT * 0.3 + i * Math.PI / 3;
          ctx.beginPath();
          ctx.moveTo(w/2, h/2);
          ctx.lineTo(w/2 + Math.cos(a)*w, h/2 + Math.sin(a)*h);
          ctx.stroke();
        }
        break;
      }

      // 13 — Ocean Abyss: deep bioluminescent drift
      case 13: {
        const ag = ctx.createLinearGradient(0, 0, 0, h);
        ag.addColorStop(0, '#000814'); ag.addColorStop(1, '#00050f');
        ctx.fillStyle = ag; ctx.fillRect(0, 0, w, h);
        BG.abyssT = t / 5000;
        // Slow light rays from top — simple alpha rects, no gradient objects
        for (let i = 0; i < 4; i++) {
          const rx = w * (0.15 + i * 0.22);
          const alpha = 0.06 + 0.04 * Math.sin(BG.abyssT + i * 1.3);
          ctx.fillStyle = `rgba(0,100,200,${alpha})`;
          ctx.fillRect(rx - 5*s, 0, 30*s, h);
        }
        // Bioluminescent dots
        for (let i = 0; i < 20; i++) {
          const bx = ((i * 73 + Math.sin(BG.abyssT + i) * 30) % 400 + 400) % 400;
          const by = ((i * 97 + Math.cos(BG.abyssT * 0.5 + i) * 40) % 450 + 450) % 450;
          const ba = 0.2 + 0.2 * Math.sin(BG.abyssT * 2 + i);
          ctx.fillStyle = `rgba(0,200,180,${ba})`;
          ctx.beginPath(); ctx.arc(bx*s, by*s, 1.5*s, 0, Math.PI*2); ctx.fill();
        }
        break;
      }

      // 14 — Rainbow Prism: slow full-spectrum wave
      default: {
        BG.rainbowT = t / 6000;
        for (let y = 0; y < h; y += 4*s) {
          const hue = (y / h * 360 + BG.rainbowT * 60) % 360;
          const wave = Math.sin(y / (20*s) + BG.rainbowT) * 0.08;
          ctx.fillStyle = `hsla(${hue},80%,8%,${0.94 + wave})`;
          ctx.fillRect(0, y, w, 2*s);
        }
        // Slow shimmer — simple diagonal stripe, no gradient objects
        for (let i = 0; i < 3; i++) {
          const bx = (BG.rainbowT * 100 + i * 150) % (w + 100);
          const hue2 = (BG.rainbowT * 60 + i * 120) % 360;
          ctx.fillStyle = `hsla(${hue2},100%,70%,0.05)`;
          ctx.fillRect(bx - 20, 0, 40, h);
        }
        break;
      }
    }
  }

  function drawLadder(ctx, canvas) {
    const s = S.gameScale;
    const col = LADDER_COLORS[S.currentLadderColorIndex];

    if (col.isRainbow) {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0,   '#ff0066');
      g.addColorStop(0.2, '#ff9900');
      g.addColorStop(0.4, '#ffcc00');
      g.addColorStop(0.6, '#00ff66');
      g.addColorStop(0.8, '#00ccff');
      g.addColorStop(1,   '#b200ff');
      ctx.strokeStyle = g;
    } else {
      ctx.strokeStyle = col.color;
    }

    ctx.lineWidth = 6 * s;
    ctx.beginPath();
    ctx.moveTo(150*s, 0);           ctx.lineTo(150*s, canvas.height);
    ctx.moveTo(250*s, 0);           ctx.lineTo(250*s, canvas.height);
    ctx.stroke();

    for (let i = 0; i < canvas.height; i += 40*s) {
      ctx.beginPath();
      ctx.moveTo(150*s, i); ctx.lineTo(250*s, i);
      ctx.stroke();
    }
  }

  function drawCharacter(ctx) {
    if (S.showDefaultCharacter || !ANGLO_POLISH_EDITION) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(S.character.x, S.character.y, S.character.width, S.character.height);
      return;
    }
    if (S.selectedCharacter) {
      drawSprite(ctx, S.selectedCharacter, S.character.x, S.character.y, S.character.width);
    }
  }

  function drawBenchedCube(ctx, canvas) {
    if (!ANGLO_POLISH_EDITION || S.showDefaultCharacter || !S.selectedCharacter) return;
    const s = S.gameScale;
    const cubeSize = 25 * s;
    const cubeX = canvas.width - 80*s;
    const cubeY = canvas.height - cubeSize + 2*s;
    // Cube
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(cubeX, cubeY, cubeSize, cubeSize);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(cubeX + 2*s, cubeY + cubeSize, cubeSize - 4*s, 3*s);
    // Label
    ctx.fillStyle = '#ff0066';
    ctx.font = `${8*s}px 'Press Start 2P', cursive`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(255,0,102,0.8)';
    ctx.shadowBlur = 5*s;
    ctx.fillText('BENCHED', cubeX + cubeSize/2, cubeY - 8*s);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
  }

  function drawScore(ctx) {
    const s = S.gameScale;
    const name = S.selectedCharacter ? S.selectedCharacter.name : 'Player';
    let y = 10*s;
    const lineH = 14*s;

    ctx.fillStyle = '#ffcc00';
    ctx.font = `${12*s}px 'Press Start 2P', cursive`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(255,204,0,0.8)';
    ctx.shadowBlur = 8*s;

    for (let i = 0; i < name.length; i++) ctx.fillText(name[i], 10*s, y + i*lineH);
    y += name.length * lineH + 10*s;

    const scoreStr = 'Pts:' + S.score;
    for (let i = 0; i < scoreStr.length; i++) ctx.fillText(scoreStr[i], 10*s, y + i*lineH);

    ctx.shadowBlur = 0;
  }

  function drawGalleryCharacter(ctx, canvas, charData) {
    const s = S.gameScale;
    const charSize = 100*s;
    const spriteX = (400 - 100) / 2 * s;
    const spriteY = 50*s;
    drawSprite(ctx, charData, spriteX, spriteY, charSize);

    if (ANGLO_POLISH_EDITION && charData.image) {
      const imgSize = 200*s;
      const imgX = (400 - 200) / 2 * s;
      const imgY = 200*s;
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 3*s;
      ctx.strokeRect(imgX, imgY, imgSize, imgSize);
      ctx.drawImage(charData.image, imgX, imgY, imgSize, imgSize);
      ctx.shadowColor = 'rgba(0,255,204,0.5)';
      ctx.shadowBlur = 20*s;
      ctx.strokeRect(imgX, imgY, imgSize, imgSize);
      ctx.shadowBlur = 0;
    }

    // Name — vertical text top-left, going downward
    ctx.save();
    ctx.font = `bold ${13*s}px 'Press Start 2P', cursive`;
    ctx.fillStyle = '#ffcc00';
    ctx.shadowColor = 'rgba(255,204,0,0.6)';
    ctx.shadowBlur = 8*s;
    ctx.translate(16*s, 20*s);
    ctx.rotate(Math.PI / 2);
    ctx.fillText(charData.name.toUpperCase(), 0, 0);
    const nameWidth = ctx.measureText(charData.name.toUpperCase()).width;
    ctx.restore();

    // Role — vertical text left side, just after the name
    ctx.save();
    ctx.font = `bold ${10*s}px 'Press Start 2P', cursive`;
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = 'rgba(0,255,204,0.6)';
    ctx.shadowBlur = 8*s;
    ctx.translate(16*s, 20*s + nameWidth + 16*s);
    ctx.rotate(Math.PI / 2);
    ctx.fillText(charData.role.toUpperCase(), 0, 0);
    ctx.restore();
  }


  /* ============================================================
     6. GAME LOOP
  ============================================================ */

  const messageBox = document.querySelector('.game-message');
  const audioEl    = document.querySelector('audio');

  function showMessage(text, duration = 2500) {
    messageBox.innerText = text;
    messageBox.style.display = 'block';
    S.freezeFrame = true;
    setTimeout(() => { messageBox.style.display = 'none'; S.freezeFrame = false; }, duration);
  }

  // Expose for edition toggle IIFE
  window.showMessage = showMessage;
  window.showCharacterSelect = showCharacterSelect; // forward-declared below

  function getFunnyMessage() {
    if (!isAngloActive()) return pickRandom(MESSAGES.funny.classic);
    const id = S.selectedCharacter.id;
    return pickRandom(MESSAGES.funny[id] || MESSAGES.funny.swarvek);
  }

  function getResetMessage() {
    if (!isAngloActive()) return pickRandom(MESSAGES.reset.classic);
    const id = S.selectedCharacter.id;
    return pickRandom(MESSAGES.reset[id] || MESSAGES.reset.swarvek);
  }

  function checkColorUnlock(sc) {
    for (let i = 0; i < LADDER_COLORS.length; i++) {
      if (sc >= LADDER_COLORS[i].unlockScore && !S.unlockedColors.includes(i)) {
        S.unlockedColors.push(i);
        S.currentLadderColorIndex = i;
        showMessage(`🎨 Unlocked!\n${LADDER_COLORS[i].name} ladder\n✨ ${BACKGROUNDS[i].name} background`);
        return true;
      }
    }
    return false;
  }

  // Offscreen canvas: background renders here once, blitted to all visible canvases.
  // _bgFrame throttles expensive backgrounds to every 3rd frame (~20fps) — plenty
  // for slow atmospheric animations, but saves ~66% of background draw cost.
  let _bgCanvas = null;
  let _bgFrame  = 0;

  function redrawAll() {
    // Don't redraw during a screen shatter — keeps the old frame frozen under the smash
    if (window._shatterFreeze) return;
    // Cull canvases that have been removed from the DOM
    S.canvases = S.canvases.filter(c => document.contains(c));
    // Only draw canvases visible in the viewport
    const visible = S.canvases.filter(c => {
      const r = c.getBoundingClientRect();
      return r.bottom >= 0 && r.top <= window.innerHeight;
    });
    const targets = visible.length > 0 ? visible : S.canvases.slice(0, 1);
    if (targets.length === 0) return;

    // Ensure offscreen canvas matches target size
    const ref = targets[0];
    if (!_bgCanvas || _bgCanvas.width !== ref.width || _bgCanvas.height !== ref.height) {
      _bgCanvas = document.createElement('canvas');
      _bgCanvas.width  = ref.width;
      _bgCanvas.height = ref.height;
    }

    // Draw background onto offscreen canvas — throttled to every 3rd frame.
    // Atmospheric animations at ~20fps are indistinguishable from 60fps.
    _bgFrame++;
    if (_bgFrame % 3 === 0) {
      const bgCtx = _bgCanvas.getContext('2d');
      drawBackground(bgCtx, _bgCanvas);
    }

    targets.forEach(canvas => {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(_bgCanvas, 0, 0);
      drawLadder(ctx, canvas);
      drawCharacter(ctx);
      drawBenchedCube(ctx, canvas);
      drawScore(ctx);
    });
  }

  // Colour palette for each background theme — used to tint the site background
  // On unlock, the grid base colour shifts to match the theme —
  // tinting the phosphor glow without replacing the grid
  const BG_TINTS = [
    '#08001a', // Deep Space      — default purple-black
    '#001428', // Electric Grid   — deep teal
    '#1a0005', // Lava Lamp       — dark blood red
    '#001400', // Matrix Rain     — deep green
    '#001a0d', // Northern Lights — dark emerald
    '#120d00', // Gold Dust       — dark amber
    '#180000', // Crimson Storm   — deep crimson
    '#08051e', // Cyber City      — deep indigo
    '#00101e', // Deep Ocean      — abyss blue
    '#001820', // Arctic Pulse    — ice blue-black
    '#160500', // Sunset Blaze    — dark ember
    '#031000', // Toxic Jungle    — dark green-black
    '#0f0020', // Magenta Void    — deep violet
    '#000a18', // Ocean Abyss     — midnight blue
    '#0a0018', // Rainbow Prism   — deep purple
  ];

  window._lastBgTintIdx = -1;
  function syncSiteBackground() {
    const idx = S.currentLadderColorIndex;
    if (idx === window._lastBgTintIdx) return;
    window._lastBgTintIdx = idx;
    const tint = BG_TINTS[idx] || '#08001a';
    document.body.style.backgroundColor = tint;
    // Also update the wrapper padding area and canvas background to match
    document.querySelectorAll('.canvas-wrapper').forEach(el => {
      el.style.background = `radial-gradient(ellipse at center, ${tint}cc 0%, ${tint} 100%)`;
    });
    document.querySelectorAll('canvas').forEach(el => {
      el.style.background = `linear-gradient(135deg, ${tint}aa, ${tint})`;
    });
  }

  function update() {
    syncSiteBackground();
    redrawAll();
    if (!S.freezeFrame) {
      if (S.climbing) {
        S.character.y -= S.speed;
        if (S.character.y <= 0) {
          S.climbing = false;
          S.score++;
          const unlocked = checkColorUnlock(S.score);
          if (!unlocked && S.score % 5 === 0) showMessage(getFunnyMessage());
        }
      } else {
        S.character.y += S.speed;
        if (S.character.y >= S.groundLevel) S.character.y = S.groundLevel;
      }
    }
    requestAnimationFrame(update);
  }

  function climb() {
    if (!S.climbing && S.character.y >= S.groundLevel && !S.freezeFrame) {
      S.climbing = true;
      if (S.audioEnabled) { audioEl.currentTime = 0; audioEl.play().catch(() => {}); }
    }
  }

  function openGallery() {
    const overlay = document.getElementById('galleryOverlay');
    overlay.classList.add('active');
    overlay.innerHTML = '';

    S.galleryCharacters = ANGLO_POLISH_EDITION ? [...CHARACTERS] : [
      { name: 'Classic Block', color: '#ffcc00', role: 'Default' },
      { name: 'Red Square',    color: '#ff0066', role: 'Unlock: 5 pts' },
      { name: 'Blue Cube',     color: '#00ccff', role: 'Unlock: 10 pts' },
      { name: 'Green Cube',    color: '#00ff66', role: 'Unlock: 15 pts' },
      { name: 'Purple Block',  color: '#b200ff', role: 'Unlock: 20 pts' },
    ];

    // Preload photos
    if (ANGLO_POLISH_EDITION) {
      S.galleryCharacters.forEach(char => {
        if (char.id && !char.image) {
          const img = new Image();
          img.src = 'images/' + char.id + '.jpg';
          img.onload = () => { char.image = img; };
        }
      });
    }

    // Default to current character's slide
    S.currentGalleryIndex = ANGLO_POLISH_EDITION && S.selectedCharacter
      ? S.galleryCharacters.findIndex(c => c.id === S.selectedCharacter.id)
      : 0;
    if (S.currentGalleryIndex < 0) S.currentGalleryIndex = 0;

    const content = document.createElement('div');
    content.className = 'gallery-content';
    overlay.appendChild(content);

    S.galleryCharacters.forEach((char, index) => {
      const isCurrentChar = ANGLO_POLISH_EDITION && S.selectedCharacter && char.id === S.selectedCharacter.id;
      const selectBtnText = isCurrentChar ? '✓ Current Character' : '⚡ Select & Reset';

      const slide = document.createElement('div');
      slide.className = 'gallery-slide' + (index === S.currentGalleryIndex ? ' active' : '');
      slide.innerHTML = `
        <section style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
          <div class="container">
            <h2 class="section-title">CHARACTER GALLERY</h2>
            <div class="game-container">
              <div class="canvas-wrapper gallery-canvas">
                <canvas width="400" height="450"></canvas>
                <button class="game-btn gallery-close-btn">✕</button>
                <button class="game-btn prev-char-btn gallery-prev-btn">◀</button>
                <button class="game-btn next-char-btn gallery-next-btn">▶</button>
              </div>
              <div class="character-info">
                ${ANGLO_POLISH_EDITION ? `
                  <button class="game-btn select-char-btn${isCurrentChar ? ' active' : ''}"
                          ${isCurrentChar ? 'disabled' : ''}>
                    ${selectBtnText}
                  </button>` : ''}
              </div>
            </div>
          </div>
        </section>`;
      content.appendChild(slide);

      // Wire canvas
      const canvas = slide.querySelector('canvas');
      const sc = S.gameScale;
      canvas.width  = 400 * sc;
      canvas.height = 450 * sc;
      canvas._charData = char;

      // Nav buttons
      slide.querySelector('.prev-char-btn').onclick = () => navigateGallery(-1);
      slide.querySelector('.next-char-btn').onclick = () => navigateGallery(1);
      slide.querySelector('.gallery-close-btn').onclick = closeGallery;

      // Select button
      if (ANGLO_POLISH_EDITION && !isCurrentChar) {
        const selectBtn = slide.querySelector('.select-char-btn');
        if (selectBtn) selectBtn.onclick = () => switchCharacter(char);
      }
    });

    startGalleryAnimation();
  }

  function navigateGallery(direction) {
    const slides = document.querySelectorAll('.gallery-slide');
    slides[S.currentGalleryIndex].classList.remove('active');
    S.currentGalleryIndex = (S.currentGalleryIndex + direction + S.galleryCharacters.length) % S.galleryCharacters.length;
    slides[S.currentGalleryIndex].classList.add('active');
  }

  function startGalleryAnimation() {
    if (S.galleryAnimationId) cancelAnimationFrame(S.galleryAnimationId);
    function animate() {
      document.querySelectorAll('.gallery-overlay canvas').forEach(canvas => {
        if (!canvas._charData) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGalleryCharacter(ctx, canvas, canvas._charData);
      });
      S.galleryAnimationId = requestAnimationFrame(animate);
    }
    animate();
  }

  function closeGallery() {
    document.getElementById('galleryOverlay').classList.remove('active');
    if (S.galleryAnimationId) { cancelAnimationFrame(S.galleryAnimationId); S.galleryAnimationId = null; }
  }

  function showYMCADance() {
    const s = document.createElement('style');
    s.textContent = `

      @keyframes ymca-fadeout    { from{opacity:1} to{opacity:0} }
      @keyframes ymca-disco-pulse{ 0%,100%{opacity:0.3} 50%{opacity:0.6} }

      @keyframes ymca-ball-spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    `;
    document.head.appendChild(s);

    // Audio via hidden video element so .mp4 works
    const audio = document.createElement('video');
    audio.src = 'ymca.mp4';
    audio.style.display = 'none';
    audio.playsInline = true;
    audio.loop = true;
    audio.volume = 0.8;
    document.body.appendChild(audio);

    // Stage overlay
    const overlay = document.createElement('div');
    overlay.style.cssText = `position:fixed;inset:0;z-index:30000;overflow:hidden;
      background:radial-gradient(ellipse at center,#2a2a2a 0%,#0a0a0a 100%);
      animation:ymca-fadein 0.4s ease forwards;`;

    // Disco floor
    const floor = document.createElement('div');
    floor.style.cssText = `position:absolute;bottom:0;left:0;right:0;height:150px;
      background:repeating-linear-gradient(90deg,
        #ff0066 0px,#ff0066 50px,#00ffcc 50px,#00ffcc 100px,
        #ffcc00 100px,#ffcc00 150px,#00ff66 150px,#00ff66 200px);
      opacity:0.3;animation:ymca-disco-pulse 2s ease-in-out infinite;`;

    // Spotlight
    const spotlight = document.createElement('div');
    spotlight.style.cssText = `position:absolute;top:-50px;left:-100px;
      width:200px;height:700px;pointer-events:none;
      background:radial-gradient(ellipse at top,rgba(255,255,255,0.3) 0%,transparent 60%);
      animation:ymca-spotlight 8s linear infinite;`;

    // Disco ball
    const ball = document.createElement('div');
    ball.style.cssText = `position:absolute;top:20px;right:50px;
      width:60px;height:60px;border-radius:50%;
      background:radial-gradient(circle at 30% 30%,#fff,#ccc,#999);
      box-shadow:inset -10px -10px 20px rgba(0,0,0,0.3),0 0 30px rgba(255,255,255,0.5);
      animation:ymca-ball-spin 4s linear infinite;`;
    const ballShine = document.createElement('div');
    ballShine.style.cssText = `position:absolute;top:5px;left:10px;width:15px;height:15px;
      background:rgba(255,255,255,0.8);border-radius:50%;filter:blur(2px);`;
    ball.appendChild(ballShine);

    // Close button
    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✕';
    closeBtn.style.cssText = `position:absolute;top:14px;right:14px;z-index:10;
      background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.3);
      color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;
      font-family:sans-serif;font-size:16px;display:flex;align-items:center;justify-content:center;
      transition:background 0.2s;`;
    closeBtn.addEventListener('mouseenter', () => closeBtn.style.background = 'rgba(255,0,102,0.7)');
    closeBtn.addEventListener('mouseleave', () => closeBtn.style.background = 'rgba(0,0,0,0.6)');

    // Canvas
    const cv = document.createElement('canvas');
    cv.style.cssText = `position:absolute;inset:0;width:100%;height:100%;`;

    overlay.appendChild(floor);
    overlay.appendChild(spotlight);
    overlay.appendChild(ball);
    overlay.appendChild(closeBtn);
    overlay.appendChild(cv);
    document.body.appendChild(overlay);

    function resizeCv() {
      cv.width  = overlay.offsetWidth;
      cv.height = overlay.offsetHeight;
    }
    resizeCv();
    window.addEventListener('resize', resizeCv);

    // Dance poses
    const POSES = { neutral:0, Y:1, M:2, C:3, A:4, clap:5 };
    const SEQUENCE = [
      POSES.neutral, POSES.Y, POSES.neutral, POSES.M, POSES.clap,
      POSES.C, POSES.neutral, POSES.A, POSES.clap, POSES.Y
    ];
    const OFFSETS  = [0, 2, 4, 1, 3, 5]; // stagger per character
    const COLORS   = {
      swarvek:'#c9453b', derek:'#aa96da', michel:'#4ecdc4',
      greg:'#95e1d3', mario:'#f38181', tobin:'#e53935'
    };
    const CHAR_IDS   = ['swarvek','derek','michel','greg','mario','tobin'];
    const CHAR_NAMES = ['Swarvek','Derek','Michel','Greg','Mario','James'];
    const DRAW_FNS   = {
      swarvek: drawSwarvekSprite, derek: drawDerekSprite, michel: drawMichelSprite,
      greg: drawGregSprite, mario: drawMarioSprite, tobin: drawJamesSprite
    };

    function drawDanceArms(ctx, x, y, w, h, color, pose) {
      ctx.fillStyle = color;
      switch(pose) {
        case POSES.Y:
          ctx.fillRect(x - w*0.3,  y + h*0.3,  w*0.4,  h*0.15);
          ctx.fillRect(x + w*0.9,  y + h*0.3,  w*0.4,  h*0.15);
          break;
        case POSES.M:
          ctx.fillRect(x - w*0.1,  y + h*0.2,  w*0.15, h*0.4);
          ctx.fillRect(x + w*0.95, y + h*0.2,  w*0.15, h*0.4);
          break;
        case POSES.C:
          ctx.fillRect(x - w*0.2,  y + h*0.35, w*0.3,  h*0.15);
          ctx.fillRect(x + w*0.7,  y + h*0.5,  w*0.4,  h*0.15);
          break;
        case POSES.A:
          ctx.fillRect(x - w*0.2,  y + h*0.25, w*0.35, h*0.15);
          ctx.fillRect(x + w*0.85, y + h*0.25, w*0.35, h*0.15);
          break;
        case POSES.clap:
          ctx.fillRect(x + w*0.3,  y + h*0.45, w*0.2,  h*0.15);
          ctx.fillRect(x + w*0.5,  y + h*0.45, w*0.2,  h*0.15);
          break;
        default:
          ctx.fillRect(x - w*0.1,  y + h*0.5,  w*0.4,  h*0.15);
          ctx.fillRect(x + w*0.7,  y + h*0.5,  w*0.4,  h*0.15);
      }
    }

    let animId;
    const startTime = Date.now();

    function drawFrame() {
      const ctx2 = cv.getContext('2d');
      ctx2.clearRect(0, 0, cv.width, cv.height);

      const elapsed  = (Date.now() - startTime) / 1000;
      const beatIdx  = Math.floor(elapsed * 2.5) % SEQUENCE.length;
      const n        = CHAR_IDS.length;
      const size     = Math.min(cv.width / (n + 1), cv.height * 0.38);
      const spacing  = cv.width / (n + 1);
      const groundY  = cv.height * 0.62 - size;

      CHAR_IDS.forEach((id, i) => {
        const x      = spacing * (i + 1) - size * 0.5;
        const bounce = Math.sin(elapsed * 5 + i) * size * 0.04;
        const pose   = SEQUENCE[(beatIdx + OFFSETS[i]) % SEQUENCE.length];

        ctx2.save();
        ctx2.translate(0, bounce);
        DRAW_FNS[id](ctx2, x, groundY, size);
        drawDanceArms(ctx2, x, groundY, size, size, COLORS[id], pose);
        ctx2.restore();

        // Name label
        ctx2.save();
        ctx2.fillStyle = '#fff';
        ctx2.font = `${Math.max(7, Math.floor(size * 0.13))}px "Press Start 2P", cursive`;
        ctx2.textAlign = 'center';
        ctx2.shadowColor = 'rgba(0,0,0,0.9)';
        ctx2.shadowBlur = 6;
        ctx2.fillText(CHAR_NAMES[i], x + size * 0.5, groundY + size + size * 0.22);
        ctx2.restore();
      });

      animId = requestAnimationFrame(drawFrame);
    }
    drawFrame();

    // Auto-play music
    audio.play().catch(() => {});

    // Close
    function closeYMCA() {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resizeCv);
      audio.pause();
      audio.remove();
      s.remove();
      overlay.style.animation = 'ymca-fadeout 0.35s ease forwards';
      setTimeout(() => overlay.remove(), 400);
    }
    closeBtn.addEventListener('click', e => { e.stopPropagation(); closeYMCA(); });
  }
  window.showYMCADance = showYMCADance;

     10. POLISH AUDIO
  ============================================================ */

  function initPolishAudio() {
    if (!S.polishAudio) {
      S.polishAudio = new Audio('polish.mp3');
      S.polishAudio.volume = 0.7;
    }
  }

  function playPolishAudio() {
    const pa = S.polishAudio;
    if (!pa || S.climbing || S.freezeFrame) return;
    const go = () => {
      const maxStart = Math.max(0, pa.duration - 30);
      pa.currentTime = Math.random() * maxStart;
      pa.play().catch(() => {});
      setTimeout(() => { if (pa) pa.pause(); }, 30000);
    };
    if (pa.readyState >= 1) go();
    else { pa.addEventListener('loadedmetadata', go, { once: true }); pa.load(); }
  }

  function startPolishAudioLoop() {
    stopPolishAudioLoop();
    initPolishAudio();
    playPolishAudio();
    S.polishAudioInterval = setInterval(playPolishAudio, 180000);
  }

  function stopPolishAudioLoop() {
    if (S.polishAudioInterval) { clearInterval(S.polishAudioInterval); S.polishAudioInterval = null; }
    if (S.polishAudio) { S.polishAudio.pause(); S.polishAudio.currentTime = 0; }
  }


  /* ============================================================
     12. CONTROLS  — buttons, section wiring, scroll cloning
  ============================================================ */

  const muteBtns   = [];
  const resetBtns  = [];
  const galleryBtns = [];

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') { climb(); e.preventDefault(); }
  });

  function setupControls(muteBtn, resetBtn, galleryBtn) {
    muteBtns.push(muteBtn);
    resetBtns.push(resetBtn);
    if (galleryBtn) galleryBtns.push(galleryBtn);

    // Mute / unmute
    muteBtn.addEventListener('click', () => {
      S.audioEnabled = !S.audioEnabled;
      muteBtns.forEach(btn => {
        btn.innerHTML = S.audioEnabled ? '🔊' : '🔇 Muted';
        btn.classList.toggle('active', S.audioEnabled);
      });
      if (!S.audioEnabled) audioEl.pause();
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      if (S.isResetting) return;
      if (S.score > 0 || S.character.y < S.groundLevel) {
        S.isResetting = true;
        showMessage(getResetMessage());
        setTimeout(() => {
          S.score                   = 0;
          S.character.y             = S.groundLevel;
          S.climbing                = false;
          S.currentLadderColorIndex = 0;
          S.unlockedColors          = [0];
          S.freezeFrame             = false;
          S.isResetting             = false;
          audioEl.pause();
          audioEl.currentTime = 0;
          // Reset animated background state so it restarts cleanly
          Object.keys(BG).forEach(k => { BG[k] = (typeof BG[k] === 'number') ? 0 : null; });
        }, 2500);
      }
    });

    if (galleryBtn) galleryBtn.addEventListener('click', openGallery);
  }

  /* ============================================================
     VIRTUAL SCROLL / MEMORY MANAGEMENT
     Sections are cloned infinitely in both directions as the user
     scrolls, but we only keep ~5 alive at any time.

     wireSection()  — registers a new section's canvas + buttons
     unwireSection() — deregisters and removes a section, freeing
                       its canvas from the redrawAll() loop and
                       unplugging its buttons from the global arrays
     pruneOffscreenSections() — called on every scroll event;
                       removes any section more than 2 viewport
                       heights away from the visible area.

     Without this, every cloned section would keep its canvas
     running a full rAF draw loop forever — after a few minutes
     of scrolling you'd have dozens of canvases eating memory
     and tanking performance.
  ============================================================ */
  function unwireSection(section) {
    const canvas = section.querySelector('canvas');
    if (canvas) {
      // Remove from S.canvases so redrawAll stops drawing it
      S.canvases = S.canvases.filter(c => c !== canvas);
      // Remove from button arrays
      const muteBtn   = section.querySelector('.mute-btn');
      const resetBtn  = section.querySelector('.reset-btn');
      const galleryBtn = section.querySelector('.gallery-btn');
      if (muteBtn)   { const i = muteBtns.indexOf(muteBtn);     if (i > -1) muteBtns.splice(i, 1); }
      if (resetBtn)  { const i = resetBtns.indexOf(resetBtn);   if (i > -1) resetBtns.splice(i, 1); }
      if (galleryBtn){ const i = galleryBtns.indexOf(galleryBtn); if (i > -1) galleryBtns.splice(i, 1); }
    }
    section.remove();
  }

  function pruneOffscreenSections() {
    const sections = Array.from(document.querySelectorAll('.game-section'));
    const vh = window.innerHeight;
    const buffer = vh * 2; // keep sections within 2 screens of viewport

    sections.forEach(section => {
      const rect = section.getBoundingClientRect();
      if (rect.bottom < -buffer || rect.top > vh + buffer) {
        unwireSection(section);
      }
    });
  }

  function wireSection(section) {
    const canvas    = section.querySelector('canvas');
    const muteBtn   = section.querySelector('.mute-btn');
    const resetBtn  = section.querySelector('.reset-btn');
    const galleryBtn = section.querySelector('.gallery-btn');
    if (!canvas || !muteBtn || !resetBtn) return;

    // Always make sure this section is visible
    const wrapper = section.querySelector('.canvas-wrapper');
    if (wrapper) wrapper.style.visibility = '';
    const controls = section.querySelector('.game-controls');
    if (controls) controls.style.visibility = '';

    // Scale canvas immediately
    canvas.width  = 400 * S.gameScale;
    canvas.height = 450 * S.gameScale;

    S.canvases.push(canvas);
    canvas.addEventListener('click', climb);
    canvas.addEventListener('touchstart', climb, { passive: true });
    setupControls(muteBtn, resetBtn, galleryBtn);
  }

  window.addEventListener('DOMContentLoaded', () => {
    const template = document.querySelector('.game-section');
    if (!template) return;

    wireSection(template);

    // Pre-clone 2 sections so the page is scrollable immediately
    for (let i = 0; i < 2; i++) {
      const clone = template.cloneNode(true);
      document.body.appendChild(clone);
      wireSection(clone);
    }

    // Infinite scroll — clone more sections in both directions
    window.addEventListener('scroll', () => {
      // Scrolling down — append at bottom
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
        const clone = template.cloneNode(true);
        document.body.appendChild(clone);
        wireSection(clone);
      }
      // Scrolling up — prepend at top, adjust scroll position so page doesn't jump
      if (window.scrollY < 300) {
        const clone = template.cloneNode(true);
        const firstSection = document.querySelector('.game-section');
        document.body.insertBefore(clone, firstSection);
        wireSection(clone);
        window.scrollBy(0, clone.offsetHeight);
      }
      // Remove sections that are far off screen to free memory
      pruneOffscreenSections();
    });

    update();
  });

  </script>

  <!-- ============================================================
       SCALE MODULE
       Runs once on load; adjusts canvas dimensions and speed
       for HiDPI / ultra-wide screens.
       Does NOT redefine update/climb/drawLadder — those live
       above in the main script.
  ============================================================ -->
  <script>
  (function initScale() {
    const w = window.screen.width;
    let sc = 1;
    if      (w >= 5120) sc = 4.5;
    else if (w >= 3840) sc = 3.5;
    else if (w >= 2560) sc = 2.5;
    else if (w >= 1920) sc = 1.75;

    S.gameScale   = sc;
    S.groundLevel = 420 * sc;
    S.speed       = 4 * sc;

    window.addEventListener('load', () => {
      // Scale character position and size
      S.character.x      = 187 * sc;
      S.character.y      = 420 * sc;
      S.character.width  = 30  * sc;
      S.character.height = 30  * sc;

      // Scale any canvases already in the DOM
      document.querySelectorAll('canvas').forEach(canvas => {
        canvas.width  = 400 * sc;
        canvas.height = 450 * sc;
      });
    });
  })();
  </script>

          text-shadow:0 0 20px #00ffcc,0 0 50px rgba(0,255,204,0.5);
          animation:intro-logo-in 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s both;
          line-height:1.3;text-align:center;">
          LADDER<br>LOOP
        </div>

        <!-- Divider -->
        <div style="width:60%;max-width:300px;height:2px;
          background:linear-gradient(90deg,transparent,#ff0066,#00ffcc,#ff0066,transparent);
          animation:intro-sub-in 0.5s ease-out 0.4s both;"></div>

        <!-- Tagline -->
        <div style="font-family:'Press Start 2P',cursive;
          font-size:clamp(0.45rem,1.6vh,0.75rem);text-align:center;line-height:2.2;
          animation:intro-sub-in 0.5s ease-out 0.6s both;">
          <span style="color:#ff0066;">Climb.</span>&nbsp;
          <span style="color:#00ffcc;">Fall.</span>&nbsp;
          <span style="color:#ffcc00;">Repeat.</span>
        </div>

        <!-- Button -->
        <button id="introStartBtnLandscape" style="font-family:'Press Start 2P',cursive;
          padding:0.65rem 1.4rem;font-size:clamp(0.45rem,1.6vh,0.7rem);
          background:rgba(255,0,102,0.2);color:#00ffcc;
          border:2px solid #ff0066;border-radius:6px;cursor:pointer;
          animation:intro-sub-in 0.5s ease-out 0.8s both, intro-btn-pulse 2s ease-in-out 2s infinite;
          transition:background 0.2s,transform 0.15s;letter-spacing:0.05em;">
          ▶ &nbsp;TAP TO START
        </button>
      </div>`;

    document.body.appendChild(overlay);

    // Intro preview — uses the real draw functions, identical to the live game
    let introAnimId = null;
    let introCubeY = S.groundLevel;
    let introClimbing = false;
    function animateIntroCube() {
      const c = document.getElementById('introCubeCanvas');
      if (!c) return;
      const ctx2 = c.getContext('2d');

      // Dark background
      ctx2.fillStyle = '#1a1a1a';
      ctx2.fillRect(0, 0, c.width, c.height);

      // Draw real ladder
      drawLadder(ctx2, c);

      // Draw real cube at animated position
      ctx2.fillStyle = '#ffcc00';
      ctx2.fillRect(S.character.x, introCubeY, S.character.width, S.character.height);

      // Draw real score
      drawScore(ctx2);

      // Animate — cube climbs up and falls back on its own
      if (introClimbing) {
        introCubeY -= S.speed;
        if (introCubeY <= 0) introClimbing = false;
      } else {
        introCubeY += S.speed;
        if (introCubeY >= S.groundLevel) {
          introCubeY = S.groundLevel;
          introClimbing = true;
        }
      }

      introAnimId = requestAnimationFrame(animateIntroCube);
    }
    animateIntroCube();

    // Hover effect on button
    const startBtn = overlay.querySelector('#introStartBtn');
    startBtn.addEventListener('mouseover', () => {
      startBtn.style.background = 'rgba(255,0,102,0.4)';
      startBtn.style.transform = 'scale(1.05)';
    });
    startBtn.addEventListener('mouseout', () => {
      startBtn.style.background = 'rgba(255,0,102,0.2)';
      startBtn.style.transform = 'scale(1)';
    });
    document.body.appendChild(overlay);

    let dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      window._shatterFreeze = true;
      // Blank and hide all game canvases and controls immediately
      S.canvases.forEach(c => {
        c.getContext('2d').clearRect(0, 0, c.width, c.height);
        const wrapper = c.closest('.canvas-wrapper');
        if (wrapper) wrapper.style.visibility = 'hidden';
      });
      document.querySelectorAll('.game-controls').forEach(el => el.style.visibility = 'hidden');
      if (introAnimId) { cancelAnimationFrame(introAnimId); introAnimId = null; }
      // Van drives in FIRST, then smash, then character select
      showVanIntro(() => {
        playGlassBreak();
        shatterScreen(overlay);
        const delay = window.innerWidth <= 768 ? 700 : 1200;
        setTimeout(() => {
          overlay.remove();
          document.querySelectorAll('.glass-piece').forEach(p => p.remove());
          window._shatterFreeze = false;
          if (window.showSiteHeader) window.showSiteHeader();
          showCharacterSelect();
        }, delay);
      });
    }

    // Wire both buttons to dismiss
    overlay.querySelector('#introStartBtn').addEventListener('click', dismiss);
    const landscapeBtn = overlay.querySelector('#introStartBtnLandscape');
    if (landscapeBtn) landscapeBtn.addEventListener('click', dismiss);

    // Switch between portrait and landscape layouts
    function updateLayout() {
      const isLandscape = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
      const portrait  = overlay.querySelector('#intro-portrait');
      const landscape = overlay.querySelector('#intro-landscape');
      if (portrait)  portrait.style.display  = isLandscape ? 'none' : 'flex';
      if (landscape) landscape.style.display = isLandscape ? 'flex' : 'none';
    }
    updateLayout();
    window.addEventListener('orientationchange', () => setTimeout(updateLayout, 100));
    window.addEventListener('resize', updateLayout);
    document.addEventListener('keydown',   dismiss, { once: true });
    document.addEventListener('click',     () => { if (!dismissed) dismiss(); });
    document.addEventListener('touchstart', () => { if (!dismissed) dismiss(); }, { passive: true });
  })();
  </script>
