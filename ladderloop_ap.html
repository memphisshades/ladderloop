  <script>
  (function initComingSoon() {
    // Inject "🏁 SOON" button into every .game-controls after DOM ready
    window.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.game-controls').forEach(ctrl => {
        const btn = document.createElement('button');
        btn.className = 'game-btn coming-soon-btn';
        btn.style.cssText = 'position:relative;background:rgba(255,204,0,0.15);border-color:#ffcc00;opacity:0.8;';
        btn.innerHTML = `🏁 SOON<span style="position:absolute;top:-8px;right:-8px;
          background:#ff0066;color:#fff;font-size:0.5rem;padding:0.2rem 0.4rem;
          border-radius:3px;animation:pulse-badge 2s infinite;">NEW</span>`;
        const galleryBtn = ctrl.querySelector('.gallery-btn');
        if (galleryBtn) galleryBtn.after(btn);
        else ctrl.appendChild(btn);
        btn.onclick = openComingSoon;
      });

      document.getElementById('comingSoonCloseBtn').onclick = closeComingSoon;
    });

    // Coming Soon preview cars
    S.comingSoonCars = [
      { x:120, y:50,  color:'#ff9900', emoji:'🚐', speed:2.5, name:'Swarvek' },
      { x:200, y:150, color:'#00ccff', emoji:'🚚', speed:2.8, name:'Derek'   },
      { x:90,  y:250, color:'#ffcc00', emoji:'⚡', speed:2.2, name:'Michel'  },
      { x:250, y:350, color:'#00ff66', emoji:'🚙', speed:2.6, name:'Greg'    },
      { x:150, y:450, color:'#ff0066', emoji:'🎨', speed:3.0, name:'Mario'   },
    ];

    function openComingSoon() {
      document.getElementById('comingSoonOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      // Play music if available
      if (S.audioEnabled) {
        const m = new Audio('race-menu.mp3');
        m.volume = 0.5;
        m.play().catch(()=>{});
        setTimeout(()=>{m.pause();m.currentTime=0;},30000);
        window._comingSoonMusic = m;
      }
      startComingSoonAnim();
    }

    function closeComingSoon() {
      document.getElementById('comingSoonOverlay').classList.remove('active');
      document.body.style.overflow = '';
      if (window._comingSoonMusic) { window._comingSoonMusic.pause(); window._comingSoonMusic=null; }
      if (S.comingSoonAnimationId) { cancelAnimationFrame(S.comingSoonAnimationId); S.comingSoonAnimationId=null; }
    }

    function startComingSoonAnim() {
      const canvas = document.getElementById('comingSoonCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      function animate() {
        if (!document.getElementById('comingSoonOverlay').classList.contains('active')) return;
        ctx.fillStyle='#2d5016'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#3a3a3a'; ctx.fillRect(80,0,240,canvas.height);

        // Road edges
        const off=(Date.now()/15)%25;
        ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2; ctx.setLineDash([15,10]); ctx.lineDashOffset=-off;
        ctx.beginPath(); ctx.moveTo(200,0); ctx.lineTo(200,canvas.height); ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.setLineDash([20,20]);
        ctx.beginPath(); ctx.moveTo(80,0); ctx.lineTo(80,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(320,0); ctx.lineTo(320,canvas.height); ctx.stroke();
        ctx.setLineDash([]);

        // Vans
        S.comingSoonCars.forEach(car => {
          car.y += car.speed;
          if (car.y > canvas.height+60) { car.y=-60; car.x=100+Math.random()*200; }
          const cw=52, ch=78;
          ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(car.x+4,car.y+ch+3,cw-8,5);
          ctx.fillStyle=car.color;
          ctx.fillRect(car.x+6,car.y,cw-12,ch*0.75);
          ctx.fillRect(car.x+12,car.y+ch*0.75,cw-24,ch*0.25);
          ctx.fillStyle='rgba(135,206,235,0.7)'; ctx.fillRect(car.x+14,car.y+ch*0.78,cw-28,ch*0.15);
          ctx.fillStyle='rgba(100,149,237,0.5)';
          ctx.fillRect(car.x+9,car.y+ch*0.15,5,ch*0.25);
          ctx.fillRect(car.x+cw-14,car.y+ch*0.15,5,ch*0.25);
          ctx.fillStyle='#ffff00';
          ctx.fillRect(car.x+10,car.y+ch*0.05,8,5); ctx.fillRect(car.x+cw-18,car.y+ch*0.05,8,5);
          ctx.fillStyle='#333'; ctx.fillRect(car.x+14,car.y+ch*0.12,cw-28,4);
          ctx.fillStyle='#1a1a1a';
          [[car.x+2,car.y+ch*0.15],[car.x+cw-12,car.y+ch*0.15],[car.x+2,car.y+ch*0.68],[car.x+cw-12,car.y+ch*0.68]]
            .forEach(([wx,wy])=>ctx.fillRect(wx,wy,10,16));
          ctx.font='bold 10px "Press Start 2P",cursive'; ctx.textAlign='center'; ctx.fillStyle='#fff';
          ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=3;
          ctx.fillText(car.name.toUpperCase(), car.x+cw/2, car.y+ch*0.45);
          ctx.shadowBlur=0;
          ctx.font='20px Arial';
          ctx.fillText(car.emoji, car.x+cw/2, car.y+ch*0.30);
        });

        // Banner
        const bY=canvas.height/2-30, bH=60;
        ctx.fillStyle='rgba(10,10,10,0.85)'; ctx.fillRect(0,bY,canvas.width,bH);
        ctx.fillStyle='#00ffcc'; ctx.font='bold 24px "Press Start 2P",cursive';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,255,204,0.8)'; ctx.shadowBlur=10;
        ctx.fillText('COMING SOON', canvas.width/2, bY+bH/2);
        ctx.shadowBlur=0; ctx.textBaseline='alphabetic';

        S.comingSoonAnimationId = requestAnimationFrame(animate);
      }
      animate();
    }
  })();
  </script>

  <!-- ============================================================
       EDITION TOGGLE MODULE
       Floating button to switch Classic ↔ Anglo Polish.
       Also provides a message sanitiser so Classic mode never
       accidentally shows Anglo Polish character messages.
  ============================================================ -->
  <script>
  (function initEditionToggle() {

    let toggleBtn = null;

    // Wait until intro overlay is gone before showing the toggle
    const waitForStart = setInterval(() => {
      if (!document.getElementById('intro-overlay')) {
        clearInterval(waitForStart);
        createToggle();
        updateToggleLabel();
        updateButtonVisibility();
      }
    }, 300);

    function createToggle() {
      toggleBtn = document.createElement('button');
      const isMobile = window.innerWidth <= 768 || 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      if (isMobile) {
        toggleBtn.className = 'edition-toggle-btn';
        toggleBtn.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:20001;
          width:26px;height:26px;border-radius:50%;padding:0;font-size:11px;
          background:rgba(255,0,102,0.08);border:1px solid rgba(255,102,153,0.3);
          color:rgba(255,255,255,0.3);cursor:pointer;
          display:flex;align-items:center;justify-content:center;
          transition:all 0.2s ease;box-shadow:none;font-family:sans-serif;line-height:1;`;
        toggleBtn.textContent = '⚡';
        toggleBtn.addEventListener('touchstart', function() {
          this.style.background = 'rgba(255,0,102,0.4)';
          this.style.borderColor = '#ff0066';
          this.style.color = '#fff';
        }, { passive: true });
        toggleBtn.addEventListener('touchend', function(e) {
          e.preventDefault(); // prevent the subsequent click event firing
          setTimeout(() => {
            this.style.background = 'rgba(255,0,102,0.08)';
            this.style.borderColor = 'rgba(255,102,153,0.3)';
            this.style.color = 'rgba(255,255,255,0.3)';
          }, 300);
          switchEdition();
        }, { passive: false });
      } else {
        toggleBtn.className = 'game-btn edition-toggle-btn';
        toggleBtn.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:20001;
          padding:0.75rem 1.5rem;font-size:0.85rem;color:#fff;
          background:rgba(255,0,102,0.85);border:2px solid #ff0066;border-radius:6px;
          box-shadow:0 0 20px rgba(255,0,102,0.5);cursor:pointer;
          transition:all 0.2s ease;`;
      }
      toggleBtn.onclick = switchEdition;
      document.body.appendChild(toggleBtn);
    }

    function updateToggleLabel() {
      if (!toggleBtn) return;
      if (window.innerWidth <= 768) { toggleBtn.textContent = '⚡'; return; }
      toggleBtn.textContent = window.ANGLO_POLISH_EDITION ? '🎮 Classic Mode' : '🔨 Anglo Polish';
    }

    function updateButtonVisibility() {
      document.querySelectorAll('.gallery-btn, .coming-soon-btn').forEach(b => {
        b.style.display = isAngloActive() ? 'inline-block' : 'none';
      });
    }

    window.updateButtonVisibility = updateButtonVisibility;
    window.getToggleButton = () => toggleBtn;

    function switchEdition() {
      if (window._switching) return;
      window._switching = true;

      // Close gallery if open, but NOT the character select — it must stay visible
      // as the backdrop while the cube drops and the screen shatters over it
      closeGallery();

      if (window.ANGLO_POLISH_EDITION) {
        // Currently Anglo Polish → switching TO Classic
        // Character select (or game canvas) stays visible while cube drops
        showCubeIntro(() => {
          // Cube has landed — now smash whatever is on screen
          window._shatterFreeze = true;
          playGlassBreak();
          const flashOverlay = document.createElement('div');
          flashOverlay.style.cssText = `position:fixed;inset:0;z-index:9990;background:rgba(255,255,255,0.08);pointer-events:none;`;
          document.body.appendChild(flashOverlay);
          shatterScreen(flashOverlay);
          const delay = window.innerWidth <= 768 ? 700 : 1200;
          setTimeout(() => {
            // Close character select NOW — after the smash covers the screen
            const charSelectOverlay = document.getElementById('characterSelect');
            if (charSelectOverlay) {
              charSelectOverlay.classList.remove('active');
              charSelectOverlay.style.display = 'none';
              stopPolishAudioLoop();
            }
            // Switch to Classic state
            window.ANGLO_POLISH_EDITION = false;
            S.score    = 0;
            S.climbing = false;
            S.currentLadderColorIndex = 0;
            S.unlockedColors = [0];
            Object.keys(BG).forEach(k => { BG[k] = (typeof BG[k] === 'number') ? 0 : null; });
            S.selectedCharacter    = null;
            S.showDefaultCharacter = true;
            document.body.style.backgroundColor = '#08001a';
            updateToggleLabel();
            updateButtonVisibility();
            flashOverlay.remove();
            document.querySelectorAll('.glass-piece').forEach(p => p.remove());
            document.querySelectorAll('.canvas-wrapper').forEach(w => w.style.visibility = '');
            document.querySelectorAll('.game-controls').forEach(el => el.style.visibility = '');
            window._shatterFreeze = false;
            window._switching = false;
            if (window.syncPageTitle) window.syncPageTitle();
            showMessage('🎮 CLASSIC MODE\nPress Space or Tap');
          }, delay);
        });
      } else {
        // Currently Classic → switching TO Anglo Polish
        window.ANGLO_POLISH_EDITION = true;
        S.score    = 0;
        S.climbing = false;
        S.currentLadderColorIndex = 0;
        S.unlockedColors = [0];
        Object.keys(BG).forEach(k => { BG[k] = (typeof BG[k] === 'number') ? 0 : null; });
        window._lastBgTintIdx = -1;
        updateToggleLabel();
        updateButtonVisibility();
        showVanIntro(() => {
          playGlassBreak();
          const flashOverlay = document.createElement('div');
          flashOverlay.style.cssText = `position:fixed;inset:0;z-index:9990;background:rgba(255,255,255,0.08);pointer-events:none;`;
          document.body.appendChild(flashOverlay);
          shatterScreen(flashOverlay);
          const delay = window.innerWidth <= 768 ? 700 : 1200;
          setTimeout(() => {
            flashOverlay.remove();
            document.querySelectorAll('.glass-piece').forEach(p => p.remove());
            window._shatterFreeze = false;
            window._switching = false;
            if (window.syncPageTitle) window.syncPageTitle();
            showMessage('🔨 ANGLO POLISH EDITION\nSelect your character');
            showCharacterSelect();
          }, delay);
        });
      }
    }

    // Keep label current — always visible
    setInterval(() => {
      if (!toggleBtn) return;
      if (window.innerWidth > 768) toggleBtn.textContent = window.ANGLO_POLISH_EDITION ? '🎮 Classic Mode' : '🔨 Anglo Polish';
    }, 200);

    // Message sanitiser: prevent Anglo character messages leaking into Classic mode
    const _showMsg = window.showMessage;
    const ANGLO_KEYWORDS = /swarvek|derek|michel|greg|mario|boss|poland|measured|clipboard|plumber|electrician/i;
    window.showMessage = function(text, ...rest) {
      if (!isAngloActive() && typeof text==='string' && ANGLO_KEYWORDS.test(text)) {
        const fallback = /reset|again|start|over|bottom|fell/i.test(text)
          ? pickRandom(MESSAGES.reset.classic)
          : pickRandom(MESSAGES.funny.classic);
        return _showMsg.call(this, fallback, ...rest);
      }
      return _showMsg.call(this, text, ...rest);
    };

  })();
  </script>

          </div>

          <div style="font-family:'Press Start 2P',cursive;font-size:clamp(0.3rem,1.5vw,0.4rem);
            color:rgba(255,255,255,0.3);letter-spacing:0.1em;">CLICK TO CLOSE</div>
        </div>

        <!-- Right/bottom: James sprite -->
        <div style="position:relative;flex-shrink:0;
          width:${isLandscape ? '147px' : 'min(85vw,340px)'};
          height:${isLandscape ? '90px' : '90px'};overflow:visible;">

          <div id="james-sprite" style="position:absolute;bottom:0;left:-160px;">
            <canvas id="james-canvas" width="147" height="90" style="display:block;"></canvas>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      // Draw real James sprite on canvas
      const jCanvas = overlay.querySelector('#james-canvas');
      const jCtx = jCanvas.getContext('2d');
      let jAnimId;

      function drawJames() {
        jCtx.clearRect(0, 0, 147, 90);
        drawJamesSprite(jCtx, 43, 8, 70);
        jAnimId = requestAnimationFrame(drawJames);
      }
      drawJames();

      // James walks in
      const jSprite = overlay.querySelector('#james-sprite');
      jSprite.style.animation = 'james-walk-in 1s cubic-bezier(0.2,0,0.5,1) forwards';

      // Type the credits after James arrives
      const lines = [
        { text: '> CODED BY: JAMES',   color: '#ffcc00' },
        { text: '> (THE APPRENTICE)',  color: '#ff0066' },
      ];

      const textEl = overlay.querySelector('#credits-text');
      let lineIndex = 0, charIndex = 0;
      let typing;

      function typeLine() {
        if (lineIndex >= lines.length) return;
        const line = lines[lineIndex];
        if (charIndex === 0) {
          const div = document.createElement('div');
          div.style.color = line.color;
          div.id = 'current-line';
          textEl.appendChild(div);
        }
        const currentDiv = textEl.querySelector('#current-line');
        currentDiv.textContent = line.text.slice(0, charIndex + 1);
        charIndex++;
        if (charIndex >= line.text.length) {
          currentDiv.removeAttribute('id');
          lineIndex++; charIndex = 0;
          typing = setTimeout(typeLine, 300);
        } else {
          typing = setTimeout(typeLine, 55);
        }
      }

      setTimeout(typeLine, 1100);

      // Close on click — James runs off
      overlay.addEventListener('click', () => {
        clearTimeout(typing);
        cancelAnimationFrame(jAnimId);
        jSprite.style.animation = 'james-walk-out 0.5s cubic-bezier(0.5,0,1,1) forwards';
        overlay.style.animation = 'credits-fadeout 0.5s ease 0.3s forwards';
        setTimeout(() => {
          overlay.remove();
          s.remove();
          if (toggleBtn) toggleBtn.style.display = '';
        }, 900);
      });
    }
  })();
  </script>

</body>
</html>
